version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot bumps both the pin
  # and the trailing "# vX.Y.Z" comment when a new release ships.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Gradle dependencies declared in the version catalog.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
