name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: platform-tools

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.4

      - name: Decode release keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "::error::SIGNING_KEYSTORE_BASE64 secret is not set. Configure SIGNING_* repository secrets before tagging a release."
            exit 1
          fi
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/esochan-release.jks"
          {
            echo "storeFile=$RUNNER_TEMP/esochan-release.jks"
            echo "storePassword=$SIGNING_STORE_PASSWORD"
            echo "keyAlias=$SIGNING_KEY_ALIAS"
            echo "keyPassword=$SIGNING_KEY_PASSWORD"
          } > keystore.properties

      - name: Verify and build release
        run: ./gradlew testDebugUnitTest lintDebug assembleRelease --continue

      - name: Name release artifacts
        id: artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          APK="build/outputs/apk/release/esochan-release.apk"
          if [ ! -f "$APK" ]; then
            echo "Signed release APK not found (got unsigned or missing)." >&2
            ls -laR build/outputs/apk || true
            exit 1
          fi
          cp "$APK" "dist/esochan-${VERSION}.apk"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Release notes: section for this version from CHANGELOG
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {found=1; print; next}
            found && $0 ~ /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > dist/release-notes.md
          if [ ! -s dist/release-notes.md ]; then
            echo "esochan ${VERSION}" > dist/release-notes.md
          fi

      - name: Checksums and signer certificate
        working-directory: dist
        run: |
          APK=$(ls esochan-*.apk)
          sha256sum "$APK" > SHA256SUMS
          APKSIGNER=$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}" -name apksigner -type f 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --print-certs "$APK" > signing-certificate.txt
          else
            keytool -printcert -jarfile "$APK" > signing-certificate.txt
          fi
          {
            echo ""
            echo "---"
            echo ""
            echo "### Verify this download"
            echo ""
            echo '```'
            cat SHA256SUMS
            echo '```'
            echo ""
            echo "Signing certificate (compare against the fingerprint pinned in the README):"
            echo ""
            echo '```'
            grep -iE 'SHA-256|Signer #1 certificate' signing-certificate.txt || cat signing-certificate.txt
            echo '```'
          } >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: esochan ${{ steps.artifacts.outputs.version }}
          body_path: dist/release-notes.md
          generate_release_notes: true
          files: |
            dist/esochan-*.apk
            dist/SHA256SUMS
            dist/signing-certificate.txt
