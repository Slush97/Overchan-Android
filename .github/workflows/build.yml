name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify and build
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleRelease bundleRelease --continue

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esochan-apks
          path: build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esochan-reports
          path: |
            build/reports/lint-results-debug.html
            build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn

      - name: Upload app bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esochan-release-bundle
          path: build/outputs/bundle/release/*.aab
          if-no-files-found: warn
